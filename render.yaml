services:
  - type: web
    name: elite-wealth-capital
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        value: postgresql://postgres:[YOUR-PASSWORD]@db.fykzoburtipislgjrcjm.supabase.co:5432/postgres?sslmode=require
      - key: ALLOWED_HOSTS
        value: "*"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
