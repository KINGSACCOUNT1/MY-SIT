# Render Blueprint for Elite Wealth Capital

services:
  - type: web
    name: my-site
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /
    maxShutdownDelaySeconds: 5
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-site-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: elite_wealth_capital.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: elitewealthcapita.uk,www.elitewealthcapita.uk,.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: ADMIN_EMAIL
        value: admin@elitewealthcapita.uk
      - key: ADMIN_PASSWORD
        sync: false
      - key: COMPANY_NAME
        value: Elite Wealth Capital
      - key: COMPANY_EMAIL
        value: admin@elitewealthcapita.uk
      - key: COMPANY_WEBSITE
        value: https://elitewealthcapita.uk
      - key: COMPANY_ADDRESS
        value: London, United Kingdom, Norway
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.zoho.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: admin@elitewealthcapita.uk
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: admin@elitewealthcapita.uk
      - key: CLOUDINARY_CLOUD_NAME
        value: dh5ikf5un
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: cron
    name: investment-processor
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    schedule: "0 * * * *"
    dockerCommand: python manage.py process_investments
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-site-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: elite_wealth_capital.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  - type: cron
    name: database-backup
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    schedule: "0 2 * * *"
    dockerCommand: python backup_to_supabase.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-site-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: elite_wealth_capital.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: my-site-db
    plan: starter
    region: oregon
    databaseName: my_site
    user: my_site_user
